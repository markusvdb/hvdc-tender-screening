# HVDC tender screening — v2 configuration
# ============================================================
# GATE RULE
# A tender is only considered if its title or description contains
# at least one of these HVDC-specific terms. Everything else is
# rejected regardless of score. No exceptions.
# ============================================================
hvdc_gate_terms:
  - HVDC
  - high voltage direct current
  - high-voltage direct current
  - VSC converter
  - voltage source converter
  - LCC converter
  - line commutated converter
  - line-commutated converter
  - MMC converter
  - modular multilevel converter
  - converter station
  - converter platform
  - valve hall
  # HVDC voltage levels — unambiguous when they appear
  - "±320 kV"
  - "±525 kV"
  - "±640 kV"
  - "320 kV DC"
  - "525 kV DC"
  # Named HVDC projects (always HVDC by construction)
  - Eastern Green Link
  - EGL1
  - EGL2
  - EGL3
  - EGL4
  - Viking Link
  - NeuConnect
  - LionLink
  - Shetland HVDC
  - Western HVDC Link
  - North Sea Link
  - SuedLink
  - SuedOstLink
  - NordLink
  - NordOstLink
  - BalWin
  - LanWin
  - DolWin
  - BorWin
  - HelWin
  - Kriegers Flak
  - Kontek

# ============================================================
# CLASSIFICATION
# A notice that passes the gate is classified as:
#   - "bid_candidate"  → Section 1: relevant to RTEi's HVDC team
#   - "market_intel"   → Section 2: HVDC news worth knowing
# Classification rule:
#   bid_candidate requires at least one rtei_service_signal.
#   Otherwise it's market_intel.
# ============================================================
rtei_service_signals:
  - owner's engineer
  - owners engineer
  - owner engineer
  - technical advisor
  - technical adviser
  - independent engineer
  - independent engineering
  - engineering services
  - technical assistance
  - technical support services
  - design review
  - specification review
  - spec writing
  - specification writing
  - feasibility study
  - pre-FEED
  - "pre FEED"
  - FEED study
  - concept study
  - options study
  - grid study
  - grid stability study
  - system study
  - EMT study
  - electromagnetic transient study
  - harmonic study
  - insulation coordination study
  - protection study
  - consultancy
  - consulting services
  - consultant

# ============================================================
# SCORING (within bid_candidate pool)
# Bid candidates are ranked by score to prioritise attention.
# Each gate term match: +1.0
# Each service signal match: +1.0
# Watchlist buyer match: +0.5 (buyer relationship signal)
# ============================================================
scoring:
  bid_candidate_min_score: 2.0    # Gate term + service signal = 2.0 minimum
  archive_days: 90

# ============================================================
# WATCHLIST BUYERS — boost score when these are the buyer
# ============================================================
watchlist_buyers:
  - TenneT
  - National Grid
  - National Grid Ventures
  - National Grid Electricity Transmission
  - NESO
  - National Energy System Operator
  - SSEN
  - Scottish Hydro Electric Transmission
  - Energinet
  - 50Hertz
  - Amprion
  - TransnetBW
  - Elia
  - Statnett
  - RTE
  - Red Eléctrica
  - Terna
  - Fingrid
  - Svenska kraftnät

# ============================================================
# API SCOPE
# ============================================================
api:
  fts_days_lookback: 3
  ted_days_lookback: 3
  ted_countries:
    - GBR
    - DEU
    - NLD
    - DNK
    - BEL
    - NOR
    - FRA
    - IRL
    - SWE
    - ESP
    - ITA

# ============================================================
# LLM SUMMARY
# ============================================================
llm:
  model: claude-haiku-4-5-20251001
  max_summaries_per_run: 25   # Cap cost — bid candidates first, market intel next
