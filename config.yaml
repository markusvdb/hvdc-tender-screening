# ============================================================
# STAGE CLASSIFICATION
# ============================================================
# Each notice is tagged with one of these stages based on notice_type.
# The dashboard has a filter to show only specific stages.
stages:
  pipeline:      # Planning, pre-market engagement, PIN
    keywords: [pipeline, prior information, prior-information, preliminary market engagement, planned, "UK1", "UK2", "UK3", F01, F04, F16, "general procurement notice", "Specific Procurement Notice"]
  active:        # Tender notice, bids open
    keywords: [tender notice, contract notice, "UK4", F02, F05, F17, F24, "invitation for bids", "request for expression of interest", "specific procurement notice", "invitation for prequalification"]
  corrigendum:   # Modification to a prior notice
    keywords: [corrigendum, "UK10", F14, "cor-"]
  award:         # Contract awarded
    keywords: [award, "UK6", F03, F06, F18, F20, F25, "contract award"]
  other:
    keywords: []   # catch-all

# Which stage to show by default on the dashboard:
default_stage_filter: active

# Which stages go into the Monday email:
email_stages:
  - active
  - corrigendum

# ============================================================
# SCORING
# ============================================================
scoring:
  bid_candidate_min_score: 2.0
  archive_days: 90

