# World Bank scope — which sectors / regions matter
worldbank:
  # Limit to energy-sector notices (major-sector filter)
  major_sector: "Energy and Extractives"
  # Notice types we care about
  notice_types:
    - "Request for Expression of Interest"
    - "Invitation for Bids"
    - "Invitation for Prequalification"
    - "General Procurement Notice"
    - "Specific Procurement Notice"
    - "Contract Award"

